<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>55_Lar的主页</title>
  <meta name="description" content="55_Lar 的个人导航页" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="page">
    <section class="hero">
      <img class="avatar avatar-image" src="avatar.jpg" alt="55Lar 的头像" />
      <div class="hero-text">
        <p class="eyebrow">55lar.com</p>
        <h1>55_Lar</h1>
        <p class="subtitle">
          55_Lar的小据点
        </p>
      </div>
    </section>

    <section class="intro card">
      <p>
        这里55_Lar的神秘小站
      </p>
    </section>

    <section class="nav-grid">
      <a class="nav-card" href="https://blog.55lar.com" target="_blank" rel="noopener noreferrer">
        <div class="nav-card-title">博客</div>
        <div class="nav-card-desc">记录折腾、笔记和一些想法。</div>
        <div class="nav-card-link">blog.55lar.com</div>
      </a>

      <a class="nav-card" href="https://55lar.com" target="_blank" rel="noopener noreferrer">
        <div class="nav-card-title">主站</div>
        <div class="nav-card-desc">当前域名入口，也可以继续扩展更多内容。</div>
        <div class="nav-card-link">55lar.com</div>
      </a>
    </section>


    <footer class="footer">
      <p>© 2026 55_Lar · Powered by GitHub Pages</p>
    </footer>
  </main>
</body>
</html>
