<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>55_Lar的主页</title>
  <meta name="description" content="55_Lar 的个人导航页" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="page">
    <section class="hero">
      <img class="avatar avatar-image" src="avatar.jpg" alt="55Lar 的头像" />
      <div class="hero-text">
        <p class="eyebrow">55lar.com</p>
        <h1>55_Lar is here!</h1>
        <p class="subtitle">
          55_Lar的小据点
        </p>
      </div>
    </section>

    <section class="intro card">
      <p>
        这里55_Lar的神秘小站
      </p>
    </section>

    <section class="nav-grid">
      <a class="nav-card" href="https://blog.55lar.com" target="_blank" rel="noopener noreferrer">
        <div class="nav-card-title">博客</div>
        <div class="nav-card-desc">一些小笔记</div>
        <div class="nav-card-link">blog.55lar.com</div>
      </a>

      <a class="nav-card" href="https://55lar.com" target="_blank" rel="noopener noreferrer">
        <div class="nav-card-title">主站</div>
        <div class="nav-card-desc">当前域名入口</div>
        <div class="nav-card-link">55lar.com</div>
      </a>
    </section>

    <footer class="footer">
      <p>© 2026 55_Lar · Powered by GitHub Pages</p>
    </footer>
  </main>

  <div id="update-modal" class="update-modal hidden" aria-hidden="true">
    <div
      class="update-modal-content card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="update-modal-title"
    >
      <p class="update-badge">站点更新提醒</p>
      <h2 id="update-modal-title">发现新版本</h2>
      <p class="update-modal-text">
        网站内容已经更新，点击“立即更新”即可刷新并查看最新版本。
      </p>
      <div class="update-actions">
        <button id="update-now" class="update-btn update-btn-primary" type="button">
          立即更新
        </button>
        <button id="update-later" class="update-btn update-btn-secondary" type="button">
          稍后再说
        </button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = "homepage_seen_version";
      const VERSION_URL = "./version.json?ts=" + Date.now();

      const modal = document.getElementById("update-modal");
      const updateNowBtn = document.getElementById("update-now");
      const updateLaterBtn = document.getElementById("update-later");

      if (!modal || !updateNowBtn || !updateLaterBtn) return;

      function showModal() {
        modal.classList.remove("hidden");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function hideModal() {
        modal.classList.add("hidden");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      async function checkForUpdate() {
        try {
          const response = await fetch(VERSION_URL, { cache: "no-store" });
          if (!response.ok) return;

          const data = await response.json();
          const latestVersion = data.version;
          if (!latestVersion) return;

          const seenVersion = localStorage.getItem(STORAGE_KEY);

          if (!seenVersion) {
            localStorage.setItem(STORAGE_KEY, latestVersion);
            return;
          }

          if (seenVersion !== latestVersion) {
            showModal();

            updateNowBtn.onclick = function () {
              localStorage.setItem(STORAGE_KEY, latestVersion);

              const nextUrl = new URL(window.location.href);
              nextUrl.searchParams.set("update", Date.now().toString());

              if ("caches" in window) {
                caches.keys()
                  .then(function (keys) {
                    return Promise.all(
                      keys.map(function (key) {
                        return caches.delete(key);
                      })
                    );
                  })
                  .finally(function () {
                    window.location.replace(nextUrl.toString());
                  });
              } else {
                window.location.replace(nextUrl.toString());
              }
            };

            updateLaterBtn.onclick = function () {
              hideModal();
            };
          }
        } catch (error) {
          console.error("检查更新失败：", error);
        }
      }

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          hideModal();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && !modal.classList.contains("hidden")) {
          hideModal();
        }
      });

      checkForUpdate();
    })();
  </script>
</body>
</html>
