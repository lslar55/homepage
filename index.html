<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lslar55</title>
  <meta name="description" content="55_Lar 的个人导航页" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="page">
    <section class="hero">
      <div class="avatar">55</div>
      <div class="hero-text">
        <p class="eyebrow">55lar.com</p>
        <h1>55_Lar</h1>
        <p class="subtitle">
          55_Lar的小据点
        </p>
      </div>
    </section>

    <section class="intro card">
      <p>
        这里55_Lar的神秘小站
      </p>
    </section>

    <section class="section-header">
      <h2>入口导航</h2>
      <p>可持续添加，你以后只需要复制一张卡片。</p>
    </section>

    <section class="nav-grid">
      <a class="nav-card" href="https://blog.55lar.com" target="_blank" rel="noopener noreferrer">
        <div class="nav-card-title">博客</div>
        <div class="nav-card-desc">记录折腾、笔记和一些想法。</div>
        <div class="nav-card-link">lslar55.github.io</div>
      </a>

      <a class="nav-card" href="https://55lar.com" target="_blank" rel="noopener noreferrer">
        <div class="nav-card-title">主站</div>
        <div class="nav-card-desc">当前域名入口，也可以继续扩展更多内容。</div>
        <div class="nav-card-link">55lar.com</div>
      </a>
    </section>

    <section class="section-header section-header-small">
      <h2>以后怎么加新入口</h2>
    </section>

    <section class="card tip-card">
      <ol>
        <li>复制一个 <code>nav-card</code> 卡片块。</li>
        <li>修改标题、描述和链接地址。</li>
        <li>提交到 GitHub，GitHub Pages 会自动更新。</li>
      </ol>
    </section>

    <footer class="footer">
      <p>© 2026 lslar55 · Powered by GitHub Pages</p>
    </footer>
  </main>
</body>
</html>
